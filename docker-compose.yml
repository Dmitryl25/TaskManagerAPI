version: "3.8"

services:
  database:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - teamflow_network
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - teamflow_network
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - database
      - redis
    networks:
      - teamflow_network
  celery_worker:
    build: .
    env_file: .env
    depends_on:
      - database
      - redis
    networks:
      - teamflow_network
    command: uv run celery -A app.celery_app worker --loglevel=info

  celery_beat:
    build: .
    env_file: .env
    depends_on:
      - database
      - redis
    networks:
      - teamflow_network
    command: uv run celery -A app.celery_app beat --loglevel=info

  flower:
    build: .
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
    networks:
      - teamflow_network
    command: uv run celery -A app.celery_app flower --port=5555

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - teamflow_network


volumes:
  postgres_data:
  minio_data:

networks:
  teamflow_network:
    driver: bridge